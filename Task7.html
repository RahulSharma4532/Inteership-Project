<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 7: Fetch and Display User Data</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #f5f7fa;
            --text-color: #333;
            --error-color: #e74c3c;
            --card-bg: #ffffff;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--secondary-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            margin-bottom: 10px;
            color: var(--primary-color);
        }

        .controls {
            margin-bottom: 20px;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            box-shadow: var(--shadow);
        }

        button:hover {
            background-color: #357abd;
        }

        button:active {
            transform: translateY(1px);
        }

        #user-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        .user-card {
            background-color: var(--card-bg);
            border-radius: 10px;
            padding: 20px;
            box-shadow: var(--shadow);
            transition: transform 0.2s ease;
            border-left: 5px solid var(--primary-color);
        }

        .user-card:hover {
            transform: translateY(-5px);
        }

        .user-card h3 {
            margin-top: 0;
            color: var(--primary-color);
        }

        .user-card p {
            margin: 8px 0;
            font-size: 0.95rem;
        }

        .user-card .label {
            font-weight: bold;
            color: #666;
        }

        #status-message {
            margin-top: 20px;
            font-weight: bold;
        }

        .error {
            color: var(--error-color);
            padding: 15px;
            border: 1px solid var(--error-color);
            border-radius: 5px;
            background-color: #fdeaea;
        }

        .loading {
            color: #666;
            font-style: italic;
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            #user-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>User Directory</h1>
        <p>Fetching data from JSONPlaceholder API</p>
    </header>

    <div class="controls">
        <button id="reload-btn">Reload Users</button>
    </div>

    <div id="status-message"></div>
    <div id="user-container"></div>

    <script>
        const userContainer = document.getElementById('user-container');
        const statusMessage = document.getElementById('status-message');
        const reloadBtn = document.getElementById('reload-btn');

        /**
         * Fetches user data from the API and displays it on the page.
         */
        async function fetchUsers() {
            // Clear previous data and show loading state
            userContainer.innerHTML = '';
            statusMessage.innerHTML = '<span class="loading">Fetching data... Please wait.</span>';
            reloadBtn.disabled = true;

            try {
                const response = await fetch('https://jsonplaceholder.typicode.com/users');

                // Check if the response is successful
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const users = await response.json();

                // Clear loading message
                statusMessage.innerHTML = '';

                // Display users
                displayUsers(users);

            } catch (error) {
                console.error('Fetch error:', error);
                statusMessage.innerHTML = `
                    <div class="error">
                        <strong>Error fetching data:</strong> ${error.message}<br>
                        <small>Please check your internet connection and try again.</small>
                    </div>
                `;
            } finally {
                reloadBtn.disabled = false;
            }
        }

        /**
         * Renders the user cards into the container.
         * @param {Array} users - The array of user objects.
         */
        function displayUsers(users) {
            if (users.length === 0) {
                userContainer.innerHTML = '<p>No users found.</p>';
                return;
            }

            users.forEach(user => {
                const card = document.createElement('div');
                card.className = 'user-card';

                // Destructure address for cleaner template
                const { street, suite, city, zipcode } = user.address;

                card.innerHTML = `
                    <h3>${user.name}</h3>
                    <p><span class="label">Email:</span> ${user.email}</p>
                    <p><span class="label">Username:</span> ${user.username}</p>
                    <p><span class="label">Address:</span> ${street}, ${suite}, ${city}, ${zipcode}</p>
                    <p><span class="label">Company:</span> ${user.company.name}</p>
                    <p><span class="label">Phone:</span> ${user.phone}</p>
                `;

                userContainer.appendChild(card);
            });
        }

        // Event listener for reload button
        reloadBtn.addEventListener('click', fetchUsers);

        // Initial fetch on page load
        fetchUsers();
    </script>
</body>

</html>
